# Linking for the C++/CUDA tensor-network engine (only used with `--features cuda`).
# Uncomment on a machine where cuda/ has been built into cuda/build, and adjust
# the CUDA toolkit lib path. Kept here (not in a build.rs) so the default build
# stays pure-Rust and needs no GPU/toolkit.
#
# [target.x86_64-pc-windows-msvc]
# rustflags = [
#   "-L", "native=../../cuda/build",
#   "-l", "dylib=tessera_qa",
#   "-L", "native=C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v12.6/lib/x64",
#   "-l", "dylib=cudart",
# ]
#
# [target.x86_64-unknown-linux-gnu]
# rustflags = [
#   "-L", "native=../../cuda/build",
#   "-l", "dylib=tessera_qa",
#   "-L", "native=/usr/local/cuda/lib64",
#   "-l", "dylib=cudart",
# ]
