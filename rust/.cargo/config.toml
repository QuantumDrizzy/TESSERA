# The C++ MPS tensor-network engine is linked under `--features cuda` via
# build.rs (which computes an absolute path to cuda/build/tessera_qa.lib).
#
# Build the engine first:
#   cd cuda && cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release && cmake --build build
# Then the crate:
#   cargo build --release --features cuda
# At runtime, copy cuda/build/tessera_qa.dll next to the resulting executable.
#
# The default build (no `cuda` feature) is pure-Rust and needs no C++ toolkit.
